    <!-- Organization schema — gives Google's Knowledge Graph and AI search
         engines (ChatGPT, Perplexity, Claude) something structured to ground on. -->

        { "@type": "Country", "name": "Malaysia" },
        { "@type": "Country", "name": "Singapore" },
        { "@type": "Country", "name": "Thailand" }
      ],
      "knowsAbout": [
        "Parenting marketplace",
        "Mom-influencer network",
        "Brand partnerships",
        "Family commerce",
        "Community-powered commerce",
        "Southeast Asia digital media"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "MY",
        "addressLocality": "Kuala Lumpur"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "petrina.goh@nurengroup.com",

        { "@type": "Organization", "name": "Motherhood SuperApp" },
        { "@type": "Organization", "name": "Motherhood AI (MAI)" }
      ]
    }
    </script>
